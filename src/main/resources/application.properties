# Configuración común para todos los perfiles
spring.application.name=gestion-universidad-api
server.servlet.context-path=/gestion
spring.profiles.active=dev
spring.datasource.url=jdbc:mysql://localhost:3306/gestor_Universidad?allowPublicKeyRetrieval=true&useSSL=false

# Configuración básica de OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.show-actuator=false
springdoc.paths-to-match=/api/**